name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install ".[test]"

      - name: Run tests
        run: pytest --tb=short

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest
    # Only release on direct pushes to main, not on PRs.
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # fetch all tags so we can check for existing ones

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('custom_components/auto_cal/manifest.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already tagged
        id: tag_check
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
